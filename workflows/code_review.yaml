name: code_review_only
version: "1.0"
description: Run automated code review on existing codebase
stages:
  - name: review
    agent: evaluator
    input_artifacts:
      - src/
    output_artifacts:
      - review_report.md
    success_criteria:
      - "file_exists: review_report.md"
    max_iterations: 5
    auto_approve: true
