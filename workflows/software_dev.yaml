name: software_development
version: "1.0"
description: Standard unattended software development workflow
global_config:
  model: claude-sonnet-4-6
  max_iterations_per_stage: 25
  auto_approve_reads: true
  checkpoint_interval: 10

stages:
  - name: requirement_analysis
    agent: planner
    description: Analyze the user requirement and produce a detailed specification
    input_artifacts: []
    output_artifacts:
      - requirements.md
    success_criteria:
      - "file_exists: requirements.md"
    max_iterations: 5
    auto_approve: true

  - name: architecture_design
    agent: planner
    description: Design the system architecture based on requirements
    input_artifacts:
      - requirements.md
    output_artifacts:
      - design.md
      - tech_spec.md
    success_criteria:
      - "file_exists: design.md"
      - "file_exists: tech_spec.md"
    max_iterations: 5
    auto_approve: true

  - name: implementation
    agent: generator
    description: Implement the code according to the design
    input_artifacts:
      - requirements.md
      - design.md
      - tech_spec.md
    output_artifacts:
      - src/
      - tests/
    success_criteria:
      - "tests_pass"
      - "lint_clean"
    max_iterations: 25
    auto_approve: true

  - name: testing
    agent: evaluator
    description: Run comprehensive tests and quality checks
    input_artifacts:
      - src/
      - tests/
    output_artifacts:
      - test_report.md
    success_criteria:
      - "test_coverage > 80%"
      - "no_critical_bugs"
    max_iterations: 10
    auto_approve: true

  - name: review
    agent: evaluator
    description: Code review and quality assessment
    input_artifacts:
      - src/
      - tests/
      - test_report.md
    output_artifacts:
      - review_report.md
    success_criteria:
      - "code_quality_score > 7/10"
    max_iterations: 5
    auto_approve: true

  - name: delivery
    agent: generator
    description: Finalize and package the deliverables
    input_artifacts:
      - src/
      - tests/
      - review_report.md
    output_artifacts:
      - README.md
      - CHANGELOG.md
    success_criteria:
      - "file_exists: README.md"
    max_iterations: 5
    auto_approve: true
