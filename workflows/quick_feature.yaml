name: quick_feature
version: "1.0"
description: Quick feature implementation with minimal ceremony
stages:
  - name: plan
    agent: planner
    input_artifacts: []
    output_artifacts:
      - plan.md
    success_criteria:
      - "file_exists: plan.md"
    max_iterations: 3
    auto_approve: true

  - name: code
    agent: generator
    input_artifacts:
      - plan.md
    output_artifacts:
      - src/
      - tests/
    success_criteria:
      - "tests_pass"
    max_iterations: 15
    auto_approve: true
