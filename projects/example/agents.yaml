# Example: Project-specific agent registration
# Place this file at YOUR_PROJECT/.harness/agents.yaml
# The orchestrator will automatically load these agents in addition to the default 3

agents:
  - id: ui_designer
    name: UI Designer
    description: |
      Responsible for frontend UI/UX design, React component development,
      and styling with Tailwind CSS.
    skills:
      - ui_design
      - react_component_dev
      - tailwind_css
      - responsive_layout
      - accessibility
    input_schema:
      - design_spec
      - wireframe
    output_schema:
      - ui_components
      - css_modules
      - design_tokens
    constraints:
      - Only modifies frontend/src/ directory
      - Must use existing component library (shadcn/ui)
      - All components must be responsive
      - Must pass a11y checks

  - id: db_admin
    name: Database Administrator
    description: |
      Responsible for database schema design, migration management,
      query optimization, and data integrity.
    skills:
      - schema_design
      - migration_management
      - query_optimization
      - index_management
      - data_modeling
    input_schema:
      - models
      - requirements
      - existing_schema
    output_schema:
      - migration_file
      - schema_doc
      - er_diagram
    constraints:
      - All DDL changes must go through Alembic migrations
      - Never modify production database directly
      - Migrations must be reversible (upgrade + downgrade)
      - Must include data migration scripts for breaking changes

  - id: security_auditor
    name: Security Auditor
    description: |
      Responsible for code security review, vulnerability scanning,
      dependency audit, and compliance checking.
    skills:
      - vulnerability_scanning
      - dependency_audit
      - compliance_check
      - penetration_testing
      - code_review_security
    input_schema:
      - code
      - dependencies
      - configuration
    output_schema:
      - security_report
      - vulnerability_list
      - remediation_plan
    constraints:
      - Does NOT modify any code - only reports findings
      - Must check OWASP Top 10 categories
      - Must verify secrets are not committed
      - Must audit all new dependencies
